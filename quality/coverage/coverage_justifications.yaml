#
# Coverage Justification Database
# ================================
#
# This file defines justified non-covered lines for achieving 100% effective coverage.
#
# Each justification has:
#   - id: Unique kebab-case identifier
#   - category: One of: defensive_programming, tool_false_positive, platform_specific, other
#   - reason: Explanation why the line(s) cannot be covered
#   - locations: (optional) File + line specifications where justification applies
#
# Lines can also be justified via in-code markers referencing the ID:
#   // COV_JUSTIFIED <id>           — justifies the current line
#   // COV_JUSTIFIED_START <id>     — starts a justified region
#   // COV_JUSTIFIED_STOP           — ends the justified region
#
# Validation rules:
#   - IDs must be unique and kebab-case (lowercase + hyphens)
#   - Every justification needs a non-empty reason
#   - Stale justifications (line is actually covered) produce warnings
#   - References to non-existent IDs produce errors
#

version: 1

justifications:
  - id: gateway-container-lookup-invariant
    category: defensive_programming
    reason: >
      Defensive ASSERT_PRD guarding a map lookup that is guaranteed to succeed. The proxy entry
      is inserted before this code path can run and is only removed during destruction, so the
      "not found" branch is unreachable. Kept as a safety guard against future logic changes.
  - id: gateway-notification-event-type-only
    category: defensive_programming
    reason: >
      Defensive ASSERT_PRD enforcing that (un)register/notify update requests only carry EVENT
      service elements. The gateway exclusively forwards events today, so the non-EVENT branch is
      unreachable. Kept as a guard against future field/method support being added.
  - id: gateway-revalidate-known-specifier
    category: defensive_programming
    reason: >
      InstanceSpecifier is re-created from a string that was already validated when the proxy /
      registration was established (or obtained via InstanceSpecifier::ToString()). Re-validation
      therefore always succeeds and the failure branch is unreachable defensive code.
  - id: gateway-config-toplevel-already-validated
    category: defensive_programming
    reason: >
      Defensive guard in the per-section parse helpers (ParseForwardedServices/ParseReceivedServices/
      ParseTransportLayerRef). Each helper is only ever invoked with the top-level JSON object after
      ParseGatewayConfig has already verified it is a json::Object, so the "not an object" branch is
      unreachable. Kept so the helpers remain safe if reused on unvalidated input.

